name: Property Prices

on:
  schedule:
    # 06:15 UTC on the 2nd of every month (source refreshes monthly;
    # the 2nd gives the upstream update time to land).
    - cron: "15 6 2 * *"
  workflow_dispatch: {}   # manual "Run workflow" button

permissions:
  contents: write          # allow the action to commit the updated JSON

concurrency:
  group: property-prices
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Run property prices scraper
        run: python scrapers/property_prices.py

      - name: Commit & push if data changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/property_prices.json data/_debug_property_prices_captures.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "data: refresh property prices ($(date -u +%Y-%m-%d))"
            git push
          fi
